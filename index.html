<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Korir Agency | Your Trusted Coastal Property & Travel Partner — Diani, Mombasa, Kenya</title>
    <meta name="description" content="Korir Agency is a leading real estate, travel and lifestyle company on Kenya's South Coast. Property sales & rentals, holiday villas, car hire, airport & SGR transfers, tours & safaris across Coastal Kenya." />
    <meta name="keywords" content="Korir Agency, Diani properties, Mombasa real estate, holiday villas Diani, Airbnb Kenya coast, car hire Mombasa, SGR transfers, airport transfers Mombasa, tours and safaris Kenya, property management Diani, South Coast Kenya" />
    <meta name="author" content="Korir Agency" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://koriragency.co.ke/" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Korir Agency" />
    <meta property="og:title" content="Korir Agency | Your Trusted Coastal Property & Travel Partner" />
    <meta property="og:description" content="Property, travel & lifestyle solutions across Coastal Kenya. Villas, safaris, car hire, transfers & property management — book on WhatsApp +254 722 280 840." />
    <meta property="og:image" content="/images/hero-diani.jpg" />
    <meta property="og:url" content="https://koriragency.co.ke/" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Korir Agency | Coastal Kenya Property & Travel" />
    <meta name="twitter:description" content="Your trusted partner for property, travel and lifestyle services on Kenya's South Coast." />
    <meta name="twitter:image" content="/images/hero-diani.jpg" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300..800&display=swap" rel="stylesheet" />
    <!-- LocalBusiness structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Korir Agency",
      "slogan": "Your Trusted Coastal Property & Travel Partner",
      "description": "Real estate, travel and lifestyle solutions company based on the South Coast of Kenya.",
      "url": "https://koriragency.co.ke",
      "logo": "https://koriragency.co.ke/images/logo.jpg",
      "telephone": "+254722280840",
      "email": "koriragency@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Diani Beach, Ukunda",
        "addressRegion": "Kwale County",
        "addressCountry": "KE"
      },
      "areaServed": ["Diani", "Mombasa", "Kwale", "Coastal Kenya", "Kenya"],
      "sameAs": []
    }
    </script>
    <!-- Hidden forms so Netlify detects them at build time (React SPA) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
    <form name="booking" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="service" />
      <input type="text" name="item" />
      <input type="text" name="dates" />
      <textarea name="message"></textarea>
    </form>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
